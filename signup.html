<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOMA ZONE | AUTH_SIGNUP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #c5a059;
            --accent-copper: #b87333;
            --bg-deep: #121212;
            --text-cream: #f5f5f5;
        }

        body {
            background-color: #121212;
            color: var(--text-cream);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .font-serif { font-family: 'Playfair Display', serif; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: var(--primary-gold); }
    </style>
</head>
<body class="min-h-screen flex">
    <!-- Left Side: Image -->
    <div class="hidden lg:block lg:w-1/2 relative">
        <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?ixlib=rb-4.0.3&auto=format&fit=crop&w=1074&q=80" 
             alt="Choma Zone" 
             class="absolute inset-0 w-full h-full object-cover opacity-60">
        <div class="absolute inset-0 bg-gradient-to-r from-black/60 via-transparent to-[#121212]"></div>
        <div class="absolute bottom-16 left-16">
            <a href="index.html" class="text-5xl font-serif font-black tracking-widest text-white">
                CHOMA<span class="text-[#c5a059]">ZONE</span>
            </a>
            <div class="w-24 h-1 bg-[#c5a059] mt-6"></div>
            <p class="text-[#c5a059] mt-6 uppercase text-xs tracking-[0.5em] font-light">Join Our Elite Culinary Circle</p>
        </div>
    </div>

    <!-- Right Side: Form -->
    <main class="w-full lg:w-1/2 flex flex-col justify-center items-center px-8 md:px-24 bg-[#121212] relative">
        <!-- Mobile Logo -->
        <div class="lg:hidden absolute top-12 left-12">
            <a href="index.html" class="text-2xl font-serif font-black tracking-widest text-white">
                CHOMA<span class="text-[#c5a059]">ZONE</span>
            </a>
        </div>

        <div class="w-full max-w-md">
            <div class="mb-12">
                <h2 class="font-serif text-4xl md:text-5xl font-bold uppercase tracking-widest text-white">Create Profile</h2>
                <div class="w-16 h-0.5 bg-[#c5a059] mt-8"></div>
                <p class="text-gray-500 mt-8 uppercase text-[10px] tracking-[0.4em] font-light">Join the pursuit of excellence</p>
            </div>

            <form class="space-y-6">
                <div class="space-y-3">
                    <label class="block font-light text-[9px] uppercase tracking-[0.3em] text-gray-500">Full Legal Name</label>
                    <input type="text" placeholder="NAME" class="w-full bg-white/5 border border-[#c5a059]/10 py-4 px-6 font-light text-[11px] uppercase tracking-[0.2em] text-white outline-none focus:border-[#c5a059] transition-colors">
                </div>
                <div class="space-y-3">
                    <label class="block font-light text-[9px] uppercase tracking-[0.3em] text-gray-500">Preferred Communication</label>
                    <input type="email" placeholder="EMAIL ADDRESS" class="w-full bg-white/5 border border-[#c5a059]/10 py-4 px-6 font-light text-[11px] uppercase tracking-[0.2em] text-white outline-none focus:border-[#c5a059] transition-colors">
                </div>
                <div class="space-y-3">
                    <label class="block font-light text-[9px] uppercase tracking-[0.3em] text-gray-500">Private Access Key</label>
                    <input type="password" placeholder="••••••••" class="w-full bg-white/5 border border-[#c5a059]/10 py-4 px-6 font-light text-[11px] uppercase tracking-[0.2em] text-white outline-none focus:border-[#c5a059] transition-colors">
                </div>
                
                <div class="flex items-center gap-2 text-[10px] font-light uppercase tracking-widest text-gray-500">
                    <input type="checkbox" class="accent-[#c5a059]" required>
                    <span>I accept the <a href="#" class="text-[#c5a059] hover:text-white transition-colors">Terms of Excellence</a></span>
                </div>

                <button type="submit" class="w-full py-6 bg-[#c5a059] text-[#121212] font-serif font-bold text-xs uppercase tracking-[0.4em] hover:bg-white transition-all">
                    Initialize Profile
                </button>

                <p class="text-center text-[10px] font-light uppercase tracking-[0.3em] text-gray-500 mt-10">
                    Already a member? <a href="login.html" class="text-[#c5a059] hover:text-white transition-colors">Access Account</a>
                </p>
            </form>
        </div>

        <!-- Footer Note -->
        <div class="absolute bottom-12 text-[8px] text-gray-600 uppercase tracking-[0.2em]">
            &copy; 2024 CHOMA ZONE BY IYONICORP. ALL RIGHTS RESERVED.
        </div>
    </main>
</body>
</html>
