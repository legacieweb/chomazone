<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOMA ZONE | AUTH_LOGIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #c5a059;
            --accent-copper: #b87333;
            --bg-deep: #121212;
            --text-cream: #f5f5f5;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-cream);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            object-fit: cover;
            opacity: 0.3;
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(197, 160, 89, 0.1);
        }

        #mobile-sidebar {
            transition: transform 0.4s ease;
            background: #121212;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: var(--primary-gold); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <video autoplay muted loop playsinline class="video-bg">
        <source src="assets/choma.mp4" type="video/mp4">
    </video>
    <!-- Header -->
    <header class="fixed top-0 w-full z-50 glass py-6 px-6 md:px-12 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-2xl font-serif font-black tracking-widest text-white">
                CHOMA<span class="text-[#c5a059]">ZONE</span>
            </a>
        </div>
        <div class="flex items-center gap-4">
            <nav class="hidden lg:flex space-x-8 items-center">
                <a href="index.html" class="text-[10px] font-light uppercase tracking-widest hover:text-[#c5a059] transition-colors">Home</a>
                <a href="customer/dashboard.html" class="text-[10px] font-light uppercase tracking-widest hover:text-[#c5a059] transition-colors">Reservations</a>
            </nav>
            <button onclick="toggleSidebar()" class="lg:hidden p-2 text-[#c5a059]">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[60] hidden"></div>

    <!-- Mobile Sidebar (Right Side) -->
    <aside id="mobile-sidebar" class="fixed inset-y-0 right-0 w-80 border-l border-[#c5a059]/20 z-[70] flex flex-col translate-x-full">
        <div class="p-10 border-b border-[#c5a059]/10 flex justify-between items-center">
            <div class="text-2xl font-serif font-black tracking-widest text-white">
                CHOMA<span class="text-[#c5a059]">ZONE</span>
            </div>
            <button onclick="toggleSidebar()" class="text-gray-500 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <nav class="flex-grow p-10 space-y-8 font-light text-sm uppercase tracking-widest text-white">
            <a href="index.html" onclick="toggleSidebar()" class="block hover:text-[#c5a059] transition-colors">Home</a>
            <a href="customer/dashboard.html" onclick="toggleSidebar()" class="block hover:text-[#c5a059] transition-colors">Reservations</a>
        </nav>
    </aside>

    <!-- Login Form -->
    <main class="flex-grow flex items-center justify-center px-6 pt-32 pb-20">
        <div class="w-full max-w-md glass p-10 md:p-14 border border-[#c5a059]/10">
            <div class="text-center mb-12">
                <h2 class="font-serif text-3xl md:text-4xl font-bold uppercase tracking-widest text-white">Guest Access</h2>
                <div class="w-16 h-0.5 bg-[#c5a059] mx-auto mt-6"></div>
                <p class="text-gray-500 mt-6 uppercase text-[10px] tracking-[0.4em] font-light">Welcome back to excellence</p>
            </div>

            <form class="space-y-8">
                <div class="space-y-3">
                    <label class="block font-light text-[9px] uppercase tracking-[0.3em] text-gray-500">Authentication Identity</label>
                    <input type="text" placeholder="USERNAME OR EMAIL" class="w-full bg-white/5 border border-[#c5a059]/10 py-4 px-5 font-light text-[11px] uppercase tracking-[0.2em] text-white outline-none focus:border-[#c5a059] transition-colors">
                </div>
                <div class="space-y-3">
                    <label class="block font-light text-[9px] uppercase tracking-[0.3em] text-gray-500">Secure Access Key</label>
                    <input type="password" placeholder="••••••••" class="w-full bg-white/5 border border-[#c5a059]/10 py-4 px-5 font-light text-[11px] uppercase tracking-[0.2em] text-white outline-none focus:border-[#c5a059] transition-colors">
                </div>
                
                <button type="submit" class="w-full py-5 border border-[#c5a059]/40 text-[#c5a059] font-serif font-bold text-xs uppercase tracking-[0.4em] hover:bg-[#c5a059] hover:text-[#121212] transition-all">
                    Enter the Zone
                </button>

                <p class="text-center text-[10px] font-light uppercase tracking-[0.3em] text-gray-500 mt-10">
                    Not a member? <a href="signup.html" class="text-[#c5a059] hover:text-white transition-colors">Create Profile</a>
                </p>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-16 px-6 border-t border-[#c5a059]/10 text-center bg-[#0a0a0a]">
        <div class="text-2xl font-serif font-black tracking-widest mb-6">
            CHOMA<span class="text-[#c5a059]">ZONE</span>
        </div>
        <p class="text-[#c5a059]/50 text-[10px] font-light uppercase tracking-[0.3em]">
            TRADITION MEETS EXCELLENCE
        </p>
    </footer>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('translate-x-full');
            overlay.classList.toggle('hidden');
        }
    </script>
</body>
</html>
